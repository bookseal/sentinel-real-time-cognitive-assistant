version: "3.8"

services:
  sentinel:
    build: .
    ports:
      - "7860:7860"
    volumes:
      - ./:/app
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      # Loading env vars automatically from .env in the same directory using env_file
    env_file:
      - .env
    # Use standard grading run or python watch.
    # With Gradio >= 3.x, `gradio app.py` provides hot reloading automatically.
    # Otherwise, Python app.py suffices if we rely on internal Gradio UI hot reloading (if supported by app layout).
    command: python app.py
