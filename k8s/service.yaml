# =============================================================================
# Service — stable network endpoint that routes traffic to matching Pods
# Think of it as an internal load balancer / DNS entry inside the cluster
# =============================================================================

# --- API & Kind ---------------------------------------------------------------
apiVersion: v1            # Services are in the core API (no group prefix needed)
kind: Service             # Other kinds at this level: ConfigMap, Secret, Pod, ...

# --- Metadata -----------------------------------------------------------------
metadata:
  name: sentinel-svc      # cluster DNS: sentinel-svc.default.svc.cluster.local
  namespace: default

# --- Spec ---------------------------------------------------------------------
spec:

  # -- Selector: which Pods receive this traffic -------------------------------
  # Finds all Pods with label app=sentinel (defined in deployment.yaml)
  selector:
    app: sentinel

  # -- Ports: external-facing port → container port mapping --------------------
  ports:
    - protocol: TCP
      port: 80            # the port OTHER resources use to reach this Service
                          # (Ingress backend.service.port.number = 80)
      targetPort: 7860    # the actual port on the Pod (containerPort in deployment.yaml)
                          # Service 80 → Pod 7860 (Gradio)
